<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madurai Map with Leaflet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
     @import url(https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;800;900&display=swap);
    
    body {
      font-family: 'Poppins', sans-serif;
    }
    #map {
      width: 100%;
      height: 100vh;
    }

    .design{
      padding: 10px 20px;
      background-color: rgb(0, 0, 0);
      color: white !important;
      text-decoration: none;
      border-radius: 20px;
      /* margin: 20px; */
      display: block;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Create a map centered on Madurai
  const map = L.map('map').setView([9.9195, 78.1193], 12); // Coordinates for Madurai

  // Add OpenStreetMap tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // Add a marker for Meenakshi Amman Temple
  L.marker([9.9195, 78.1193]).addTo(map)
  .bindPopup('<a class="design" href="https://maps.app.goo.gl/MoHEctomJ1P2XEubA">Take me to the Spot</a> <br><a class="design" href="https://www.google.com/maps/dir/Meenakshi+Amman+Temple,+Madurai+Main,+Madurai,+Tamil+Nadu+625001/Perumal+Temple,+South+Mada+Street,+Periyar,+Madurai+Main,+Madurai,+Tamil+Nadu/Thirupparankundram,+Tamil+Nadu/Periyar+Bus+Stand+Rd,+Periyar,+Madurai+Main,+Madurai,+Tamil+Nadu+625001/@9.9008525,78.054457,17920m/data=!3m2!1e3!4b1!4m26!4m25!1m5!1m1!1s0x3b00c58461e46987:0xf134621ce5286703!2m2!1d78.1193418!2d9.9195045!1m5!1m1!1s0x3b00c5803366e22b:0xe9901b668e7b5f11!2m2!1d78.1135788!2d9.913769!1m5!1m1!1s0x3b00cfcfd8c9335b:0xae30a9cabfd07874!2m2!1d78.0719718!2d9.8822567!1m5!1m1!1s0x3b00cf7e2b291201:0xed69a3c346482f37!2m2!1d78.1106788!2d9.9155706!3e9?entry=ttu&g_ep=EgoyMDI1MDEyMS4wIKXMDSoASAFQAw%3D%3D" target="_blank">Take me to the Tour</a>')
  .openPopup();

  // Add a marker for Gandhi Memorial Museum
  L.marker([9.9190, 78.1200]).addTo(map)
    .bindPopup('Gandhi Memorial Museum')
    .openPopup();

  // Add a marker for Alagar Kovil
  L.marker([9.8600, 78.1067]).addTo(map)
    .bindPopup('Alagar Kovil')
    .openPopup();

  // Add a marker for Thirumalai Nayakkar Mahal
  L.marker([9.9206, 78.1197]).addTo(map)
    .bindPopup('Thirumalai Nayakkar Mahal')
    .openPopup();
</script>

</body>
</html>
