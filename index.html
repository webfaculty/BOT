<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madurai Map with Leaflet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Create a map centered on Madurai
  const map = L.map('map').setView([9.9195, 78.1193], 12); // Coordinates for Madurai

  // Add OpenStreetMap tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // Add a marker for Meenakshi Amman Temple
  L.marker([9.9195, 78.1193]).addTo(map)
    .bindPopup('Meenakshi Amman Temple')
    .openPopup();

  // Add a marker for Gandhi Memorial Museum
  L.marker([9.9190, 78.1200]).addTo(map)
    .bindPopup('Gandhi Memorial Museum')
    .openPopup();

  // Add a marker for Alagar Kovil
  L.marker([9.8600, 78.1067]).addTo(map)
    .bindPopup('Alagar Kovil')
    .openPopup();

  // Add a marker for Thirumalai Nayakkar Mahal
  L.marker([9.9206, 78.1197]).addTo(map)
    .bindPopup('Thirumalai Nayakkar Mahal')
    .openPopup();
</script>

</body>
</html>
